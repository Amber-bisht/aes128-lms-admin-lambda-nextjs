name: Deploy Backend to VPS via GHCR

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_GATEWAY: amber-bisht/lms-gateway
  IMAGE_NAME_LMS: amber-bisht/lms-service
  IMAGE_NAME_STUDENT: amber-bisht/lms-student-service

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./apps/gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_GATEWAY }}:latest

      - name: Build and push LMS Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/lms-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LMS }}:latest

      - name: Build and push Student Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/student-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_STUDENT }}:latest

  deploy-backend:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }} # Fallback password
          script: |
            # Ensure the target directory exists and is a git repo
            if [ ! -d "$HOME/lms-app/.git" ]; then
              rm -rf "$HOME/lms-app"
              mkdir -p "$HOME/lms-app"
              git clone https://github.com/${{ github.repository }}.git "$HOME/lms-app"
            fi
            
            cd "$HOME/lms-app"
            git pull origin main
            
            # Create .env file from GitHub Secret
            echo "${{ secrets.DOT_ENV }}" > .env
            
            # Log into GHCR to pull private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images and restart
            export GITHUB_REPOSITORY_OWNER=amber-bisht
            docker compose pull
            docker compose up -d
