services:
  gateway:
    image: ghcr.io/amber-bisht/lms-gateway:latest
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - LMS_SERVICE_URL=http://lms-service:5002
      - STUDENT_SERVICE_URL=http://student-service:5003
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - .env
    depends_on:
      - lms-service
      - student-service
    networks:
      - lms-network

  lms-service:
    image: ghcr.io/amber-bisht/lms-service:latest
    build:
      context: ./apps/lms-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - .env
    networks:
      - lms-network

  student-service:
    image: ghcr.io/amber-bisht/lms-student-service:latest
    build:
      context: ./apps/student-service
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    env_file:
      - .env
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge
